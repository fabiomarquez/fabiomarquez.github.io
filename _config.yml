### Site Settings ###
title               : Fábio Marquez
description         : >-
                      Olá, seja bem-vind@! Conheça [meus projetos](https://fabiomarquez.github.io/portfolio/ "Portfolio") ou explore [minhas publicações](https://fabiomarquez.github.io/blog/ "Blog").
baseurl             : ""                     # Change to empty quotes if you are hosting your site at <your-username>.github.io directly
repository          : 
remote_theme        : 


### Plugins ###
plugins:
  - jemoji


### Navbar Settings ###
nav_exclude:                                            # The following paths are excluded from navbar
  - pages/tags.html
  - pages/404.html
  - pages/index.md
  - pages/projects.html



